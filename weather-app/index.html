<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Weather App 🌤️</h1>
      <button id="themeToggle" class="icon-button">🌙</button>
    </div>

    <div class="controls">
      <input type="text" id="cityInput" placeholder="Enter city...">
      <button class="primary" onclick="getWeather()">Search</button>
      <button onclick="getWeatherByLocation()" class="location-btn">📍 Use My Location</button>
    </div>

    <div id="weatherResult"></div>
    <div id="forecast"></div>
    <button class="backbutt" onclick="history.back()">⬅ Back</button>
  </div>
  

   
    <script src="script.js"></script>
</body>
</html>
