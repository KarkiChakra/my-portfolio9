<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<a class="back-btn" href="../index.html">← Back</a>

<div class="calculator">
  <div class="calculator-header">
    <button type="button" class="angle-toggle" aria-label="Toggle angle mode">DEG</button>
    <button type="button" class="theme-toggle" aria-label="Toggle theme">🌙</button>
  </div>
  <input type="text" id="display" disabled>
  <div class="history-panel" aria-label="History">
    <div class="history-header">
      <div class="history-title">History</div>
      <button type="button" class="history-clear" aria-label="Clear history">Clear</button>
    </div>
    <ul id="history-list" class="history-list"></ul>
  </div>
  <div class="sci-buttons" aria-label="Scientific functions">
    <button onclick="appendFunction('sin')">sin</button>
    <button onclick="appendFunction('cos')">cos</button>
    <button onclick="appendFunction('tan')">tan</button>
    <button onclick="appendFunction('asin')">asin</button>
    <button onclick="appendFunction('acos')">acos</button>
    <button onclick="appendFunction('atan')">atan</button>
    <button onclick="appendConstant('pi')">π</button>
    <button onclick="appendConstant('e')">e</button>
    <button onclick="appendFunction('sqrt')">√</button>
    <button onclick="appendValue('^2')">x²</button>
    <button onclick="appendValue('^')">xʸ</button>
    <button onclick="appendValue('!')">x!</button>
    <button onclick="appendFunction('ln')">ln</button>
    <button onclick="appendFunction('log')">log</button>
    <button onclick="appendFunction('abs')">abs</button>
    <button onclick="appendFunction('exp')">exp</button>
    <button onclick="appendConstant('ans')">ANS</button>
    <button onclick="appendValue('%')">%</button>
  </div>

  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="appendValue('/')">÷</button>
    <button onclick="appendValue('*')">×</button>
    <button onclick="deleteLast()">⌫</button>

    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button onclick="appendValue('-')">−</button>

    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button onclick="appendValue('+')">+</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button onclick="calculate()">=</button>

    <button onclick="appendValue('0')" class="zero">0</button>
    <button onclick="appendValue('.')">.</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
